name: Render with ParaView

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.10
      - name: Install ParaView (paraview) from conda-forge
        run: |
          conda config --add channels conda-forge
          conda create -n pv -y python=3.10 paraview
          source $(conda info --base)/etc/profile.d/conda.sh
          conda activate pv
          pvpython --version
      - name: Generate sample data
        run: |
          source $(conda info --base)/etc/profile.d/conda.sh
          conda activate pv
          python3 scripts/generate_sample_vtk.py
      - name: Run render pipeline
        run: |
          source $(conda info --base)/etc/profile.d/conda.sh
          conda activate pv
          pvpython scripts/render_pipeline.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paraview-assets
          path: assets/
